<p-card class="tire-card w-full overflow-hidden">
    <div class="tire-container"> 
        <div class="tire-icon-wrapper" [style.color]="pressureColor" >
            <img #tireIcon src="tire-pressure.svg" class="tire-icon" alt="Tire Pressure" />
        </div>
        <div class="grid w-full mt-4">
            <div class="col-6">
                <div class="pressure-box">
                    <div class="pressure-label">
                        FRONT
                    </div>
                    <div
                        class="pressure-value"
                        [style.color]="frontColor"
                    >
                        {{ data?.frontPsi }}
                    </div>

                    <div class="pressure-unit">
                        PSI
                    </div>
                </div>
            </div>
            <div class="col-6">
                <div class="pressure-box">
                    <div class="pressure-label"> 
                        REAR 
                    </div>
                    <div class="pressure-value" [style.color]="rearColor">
                        {{ data?.rearPsi }}
                    </div>
                    <div class="pressure-unit">
                        PSI
                    </div>
                </div>
            </div>
        </div>
    </div>
</p-card>
