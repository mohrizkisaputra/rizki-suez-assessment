<lib-motorcycle-detail-info [data]="motorCycleDetailInfo"></lib-motorcycle-detail-info>

<p-divider />
<div class="grid">
    <div class="col flex justify-content-center align-items-center">
        <lib-air-density-widget class="flex items-center justify-center w-full h-full" [data]="snapshot?.airDensityData" (warningStatus)="warningHandler($event)"></lib-air-density-widget>
    </div>
    <div class="col flex justify-content-center align-items-center">
        <lib-avg-throttle-widget class="flex items-center justify-center w-full h-full" [data]="snapshot?.throttlePositionData"></lib-avg-throttle-widget>
    </div>
    <div class="col flex justify-content-center align-items-center">
        <lib-speed-widget class="flex items-center justify-center w-full h-full" [data]="snapshot?.speedData"></lib-speed-widget>
    </div>
    <div class="col flex justify-content-center align-items-center">
        <lib-tire-pressure-widget class="flex items-center justify-center w-full h-full" [data]="snapshot?.tirePressureData" (warningStatus)="warningHandler($event)"></lib-tire-pressure-widget>
    </div>
    <div class="col flex justify-content-center align-items-center">
        <lib-weight-widget class="flex items-center justify-center w-full h-full" [data]="weightDetailsInfo"></lib-weight-widget>
    </div>
</div>
<p-divider />

<div class="grid">
    <div class="col-9">
        <p-card class="map-card">
            <google-map height="500px" width="100%" [center]="center" [zoom]="zoom">
                @if (directionsResults$ | async; as directionsResults) {
                <map-directions-renderer 
                    [directions]="directionsResults" 
                    [options]="directionsOptions">
                </map-directions-renderer>
                }
            </google-map>
        </p-card>
    </div>
    <div class="col flex justify-content-center align-items-center">
        <lib-fuel-consumption-widget class="flex items-center justify-center w-full h-full" [distance]="distanceInKm" [data]="this.snapshot?.fuelEconomyResult"></lib-fuel-consumption-widget>
    </div>
</div>

<p-dialog [(visible)]="showWarningDialog" [modal]="true" [closable]="true" [draggable]="false" [resizable]="false" [showHeader]="false" [style]="{ width: '22rem', borderRadius: '16px', overflow: 'hidden' }">
  <div class="warning-dialog">
    <div class="icon-wrap">
      <div class="icon-ring">
        <img [src]="alertWarningIcon + '.svg'" class="alert-icon" alt="Warning icon"/>
      </div>
    </div>
    <p class="alert-message">{{ alertWarning?.message }}</p>
    <button class="dismiss-btn" (click)="showWarningDialog = false"> Dismiss </button>

  </div>
</p-dialog>
