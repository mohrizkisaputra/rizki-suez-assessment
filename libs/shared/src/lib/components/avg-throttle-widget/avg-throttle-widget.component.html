<p-card class="throttle-card w-full overflow-hidden">
    <div class="flex justify-content-center">
        <div class="gauge-wrapper" [style.color]="throttleColor" >
            <img #gaugeIcon src="motorcycle-gauge.svg" class="gauge-icon" alt="Throttle Position" />
        </div>
    </div>
    <div class="metric-list">
        <div class="grid align-items-center">
            <div class="col h-full w-full">
                <div class="metric-item throttle h-full justify-content-center">
                    <div class="metric-label"> Throttle Position </div>
                    <div class="metric-value throttle-value"> {{ data?.throttlePct }} %</div>
                </div>
            </div>
            <div class="col h-full w-full">
                <div class="metric-item max-throttle h-full justify-content-center">
                    <div class="metric-label"> Max Throttle Position </div>
                    <div class="metric-value"> {{ data?.maxThrottlePct }} % </div>
                </div>
            </div>
        </div>
    </div>
</p-card>
