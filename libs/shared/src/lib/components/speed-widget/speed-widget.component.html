<p-card class="rpm-card w-full overflow-hidden">
    <div class="speed-container">
        <div #kmhValue class="kmh-value" [style.color]="speedColor">
            {{ data?.speedKmh }}
        </div>
        <div class="rpm-unit"> Km/h </div>

        <div #rpmValue class="rpm-value mt-"> {{ data?.rpm }} rev/min </div>
    </div>

</p-card>
